<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-pop Band</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">
</head>

<body class="bg-black text-white">

  <!-- HERO -->
<section 
  id="hero" 
  class="h-screen relative flex items-center justify-center text-center bg-cover bg-center"
  style="background-image: url('/Background.jpg');"
>

  <!-- OVERLAY -->
  <div class="absolute inset-0 bg-black/60 z-0"></div>

  <!-- TEXT -->
  <h1 
  
  id="band-name" 
  class="relative z-10 text-5xl md:text-9xl font-cinzel"
  style="font-family: 'Cinzel', serif;"
  ></h1>

</section>
  <!-- STORY -->
  <section class="min-h-screen px-6 md:px-20 py-20 bg-gray-900">
    <h2 class="text-3xl font-bold mb-6">Our Story</h2>
    <p id="story" class="max-w-3xl text-lg"></p>
  </section>

  <!-- MEMBERS -->
  <section class="min-h-screen px-6 md:px-20 py-20">
    <h2 class="text-3xl font-bold mb-10">Members</h2>
    <div id="members" class="grid md:grid-cols-3 gap-10"></div>
  </section>

  <!-- SONGS -->
  <section class="min-h-screen px-6 md:px-20 py-20 bg-gray-900">
    <h2 class="text-3xl font-bold mb-10">Songs</h2>
    <div id="songs" class="space-y-4"></div>
    
  </section>

  <footer class="text-center py-10 text-gray-500 text-sm">
    © <span id="year"></span> <span id="footer-name"></span>
  </footer>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
